name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 배포할 브랜치 이름

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9  # pnpm 버전 명시

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Generate Static Site
        run: pnpm generate

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.output/public'  # nuxt generate 결과 경로

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
