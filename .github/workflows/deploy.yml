name: Deploy Portfolio to Server

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script: |
            # 이미지 이름 설정 (저장소 이름 소문자로 변환 권장되나 여기서는 패키지 명칭에 따름)
            IMAGE_NAME="ghcr.io/${{ github.repository }}"
            APP_NAME="portfolio"
            # 포트 설정 (없으면 기본값 8082)
            HOST_PORT="${{ secrets.HOST_PORT || '8082' }}"

            echo "[1/4] Pull image: $IMAGE_NAME:latest"
            docker pull "$IMAGE_NAME:latest"

            echo "[2/4] Stop & remove old container"
            docker rm -f "$APP_NAME" 2>/dev/null || true

            echo "[3/4] Run new container on port $HOST_PORT"
            docker run -d --name "$APP_NAME" --restart unless-stopped \
              -p "$HOST_PORT":80 \
              "$IMAGE_NAME:latest"

            echo "[4/4] Cleanup dangling images"
            docker image prune -f

            echo "✅ Deployment completed!"
